# Build the React frontend in demo mode and deploy to GitHub Pages.
# Demo mode (REACT_APP_DEMO=true) mocks the Flask/JWT backend in the browser
# and uses Binance's free public API for live prices - free to host, no AWS.
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm install (not ci): lockfile was generated with npm 11; runner's npm 10
      # rejects its deduped nested-dep layout
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          REACT_APP_DEMO: "true"
          PUBLIC_URL: /cryptofolio
          CI: "false"
      # SPA fallback so client-side routes survive refresh on Pages
      - run: cp build/index.html build/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build
      - id: deployment
        uses: actions/deploy-pages@v4
